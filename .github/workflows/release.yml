name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build VSIX
        run: npx vsce package --out figma-mcp-helper-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ github.ref_name }}
          path: figma-mcp-helper-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: figma-mcp-helper-${{ github.ref_name }}.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath figma-mcp-helper-${{ github.ref_name }}.vsix
